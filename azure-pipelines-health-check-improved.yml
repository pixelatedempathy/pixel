# Improved Azure DevOps Pipeline with Optimized Health Checks
# This pipeline includes faster health checks and better error handling

trigger:
  branches:
    include:
      - main
      - develop

variables:
  - group: pixelated-empathy-vars
  - name: azureSubscription
    value: 'pixelated-empathy-service-connection'
  - name: appName
    value: 'pixelated-empathy-app'
  - name: resourceGroupName
    value: 'pixelated-empathy-rg'

stages:
  - stage: HealthCheck
    displayName: 'Comprehensive Health Check'
    jobs:
      - job: PreDeploymentHealthCheck
        displayName: 'Pre-deployment Health Check'
        pool:
          vmImage: 'ubuntu-latest'
        
        steps:
          - checkout: self
            displayName: 'Checkout source code'
          
          - task: AzureCLI@2
            displayName: 'Smart Health Check'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'bash'
              scriptLocation: 'scriptPath'
              scriptPath: 'scripts/smart-health-check.sh'
            env:
              AZURE_RESOURCE_GROUP: $(resourceGroupName)
              AZURE_APP_NAME: $(appName)
            timeoutInMinutes: 3
            continueOnError: true  # Don't fail pipeline for first deployments
          
          - task: AzureCLI@2
            displayName: 'Detailed Health Analysis'
            condition: succeededOrFailed()
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'bash'
              scriptLocation: 'scriptPath'
              scriptPath: 'scripts/azure-health-check-improved.sh'
              arguments: ''
            env:
              AZURE_RESOURCE_GROUP: $(resourceGroupName)
              AZURE_APP_NAME: $(appName)
            timeoutInMinutes: 3
            continueOnError: true  # Don't fail pipeline if detailed check fails
          
          - task: AzureCLI@2
            displayName: 'Application Logs Analysis'
            condition: failed()  # Only run if health checks failed
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "📋 Analyzing application logs for issues..."
                
                # Get recent logs (last 100 lines)
                echo "Getting recent application logs..."
                az webapp log download --resource-group $(resourceGroupName) --name $(appName) --log-file app-logs.zip
                
                if [ -f app-logs.zip ]; then
                  unzip -q app-logs.zip
                  echo "Recent application logs:"
                  find . -name "*.log" -exec tail -20 {} \; 2>/dev/null || echo "No log files found"
                else
                  echo "Could not download application logs"
                fi
                
                # Check for common issues
                echo ""
                echo "🔍 Checking for common issues..."
                
                # Check if app is starting
                if az webapp log tail --resource-group $(resourceGroupName) --name $(appName) --provider application --timeout 30 2>/dev/null | grep -i "started\|listening\|ready"; then
                  echo "✅ Application appears to be starting/running"
                else
                  echo "❌ No startup indicators found in logs"
                fi
            timeoutInMinutes: 2
            continueOnError: true
          
          - task: PublishTestResults@2
            displayName: 'Publish Health Check Results'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/health-check-results.xml'
              mergeTestResults: true
              failTaskOnFailedTests: false
              testRunTitle: 'Health Check Results'
            continueOnError: true

  - stage: Deploy
    displayName: 'Deploy Application'
    dependsOn: HealthCheck
    condition: succeeded()  # Only deploy if health checks pass
    jobs:
      - deployment: DeployToProduction
        displayName: 'Deploy to Azure App Service'
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - script: echo "Deployment steps would go here..."
                  displayName: 'Placeholder for deployment'
