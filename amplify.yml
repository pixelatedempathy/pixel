version: 1
frontend:
  environment:
    _CUSTOM_IMAGE: amplify:al2023
    NODE_OPTIONS: --max-old-space-size=12288

  phases:
    preBuild:
      commands:
        # Install pnpm if not already installed
        - if ! command -v pnpm &> /dev/null; then echo "Installing pnpm..." && npm install -g pnpm@10.13.1; fi
          
        # Set Node.js memory limit
        - export NODE_OPTIONS=--max-old-space-size=12288
        
        # Configure pnpm with optimized settings
        - pnpm config set store-dir .pnpm-store
        - pnpm config set auto-install-peers true
        - pnpm config set strict-peer-dependencies false
        
        # Install all dependencies with optimized flags
        - pnpm install --frozen-lockfile --prefer-offline --shamefully-hoist
        
        # Install AWS SDK only if needed for CDN
        - |
          if [ -n "$CDN_BUCKET_NAME" ]; then
            echo "Installing AWS SDK for CDN..."
            pnpm add --save-exact --no-optional @aws-sdk/client-s3;
          else
            echo "CDN not configured, skipping AWS SDK installation";
          fi
        
        # Clean up unnecessary files
        - find node_modules -type d \( -name 'test' -o -name 'tests' -o -name '__tests__' -o -name 'examples' \) -exec rm -rf {} + || true
        - find node_modules -type f \( -name '*.md' -o -name '*.markdown' -o -name 'CHANGELOG*' -o -name '*.ts' -o -name '*.tsx' -o -name '*.map' \) -delete || true
        - find node_modules -type f -name '*.d.ts' ! -path '*/@types/*' -delete || true

    build:
      commands:
        # Set environment variables
        - echo "NODE_ENV=production" > .env
        - echo "CDN_BASE_URL=${CDN_BASE_URL:-/}" >> .env
        
        # Build with production optimizations
        - pnpm run build
        
        # Process assets for CDN if configured
        - |
          if [ -n "$CDN_BUCKET_NAME" ]; then
            echo "Processing assets for CDN..."
            # Create .amplify-hosting/static directory for optimized static assets
            mkdir -p .amplify-hosting/static
            
            # Move public assets to .amplify-hosting/static
            if [ -d "public" ]; then
              cp -r public/* .amplify-hosting/static/
            fi
            
            # Upload to CDN and update asset map
            node scripts/upload-to-cdn.js
            
            # Clean up if upload was successful
            if [ $? -eq 0 ]; then
              echo "CDN upload successful"
              # Keep only the asset map in dist
              find dist \( -type f -not -name 'asset-manifest.json' \) -delete
            else
              echo "CDN upload failed, using local assets"
            fi
          fi
        
        # Create minimal output structure
        - mkdir -p .amplify-hosting/compute/default
        
        # Copy only essential files (excluding public assets if using CDN)
        - if [ -z "$CDN_BUCKET_NAME" ]; then
            cp -R public .amplify-hosting/compute/default/;
          else
            mkdir -p .amplify-hosting/compute/default/public;
            cp public/favicon.ico .amplify-hosting/compute/default/public/;
          fi
          
        - cp .env .amplify-hosting/compute/default/
        
        # Copy only necessary node_modules
        - cp -R node_modules .amplify-hosting/compute/default/
        
        # Clean up development files
        - find .amplify-hosting -type f \( -name '*.map' -o -name '*.ts' -o -name '*.tsx' -o -name '*.test.*' -o -name '*.spec.*' \) -delete
        - find .amplify-hosting -type d -empty -delete
        
        # Final size check
        - du -sh .amplify-hosting/
        
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
    
  # Disable caching to prevent size issues
  cache:
    paths: []
  customRules:
    - source: '/'
      target: '/index.html'
      status: 200
    - source: '/<*>/'
      target: '/<*>/index.html'
      status: 200
    - source: '/<*>'
      target: '/<*>/index.html'
      status: 200
    - source: '/blog/<slug>'
      target: '/blog/<slug>/index.html'
      status: 200
    - source: '/blog/<slug>/'
      target: '/blog/<slug>/index.html'
      status: 200
    - source: '/changelog/<slug>'
      target: '/changelog/<slug>/index.html'
      status: 200
    - source: '/changelog/<slug>/'
      target: '/changelog/<slug>/index.html'
      status: 200
    - source: '/docs/<...slug>'
      target: '/docs/<...slug>/index.html'
      status: 200
    - source: '/docs/<...slug>/'
      target: '/docs/<...slug>/index.html'
      status: 200
    - source: '/authors/<author>'
      target: '/authors/<author>/index.html'
      status: 200
    - source: '/authors/<author>/'
      target: '/authors/<author>/index.html'
      status: 200
    - source: '/tags/<tag>'
      target: '/tags/<tag>/index.html'
      status: 200
    - source: '/tags/<tag>/'
      target: '/tags/<tag>/index.html'
      status: 200
    - source: '/categories/<category>'
      target: '/categories/<category>/index.html'
      status: 200
    - source: '/categories/<category>/'
      target: '/categories/<category>/index.html'
      status: 200