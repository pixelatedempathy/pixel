version: 1

frontend:
  environment:
    variables:
      _CUSTOM_IMAGE: 'amplify:al2023'
  phases:
    preBuild:
      commands:
        - npm i -g pnpm
        - pnpm config set store-dir .pnpm-store
        - pnpm i
    build:
      commands:
        - env >> .env
        - pnpm run build
        - mv .env ./.amplify-hosting/compute/default/.env
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - '.pnpm-store/**/*'
      - '.astro/**/*'