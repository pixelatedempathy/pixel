version: 1
frontend:
  environment:
    _CUSTOM_IMAGE: amplify:al2023
    NODE_OPTIONS: --max-old-space-size=12288
  phases:
    preBuild:
      commands:
        # Install pnpm and configure
        - npm i -g pnpm
        - pnpm config set store-dir .pnpm-store
        - pnpm install --prod --frozen-lockfile --prefer-offline --shamefully-hoist
        # Then install dev dependencies
        - pnpm install --frozen-lockfile --prefer-offline --shamefully-hoist --ignore-scripts
        
    build:
      commands:
        # Set environment variables
        - env | grep -v '^NODE_ENV=' | grep -v '^NODE_OPTIONS=' > .env
        
        # Build with increased memory and production mode
        - NODE_ENV=production NODE_OPTIONS="--max-old-space-size=12288" pnpm run build
        
        # Create output directory structure
        - mkdir -p .amplify-hosting/compute/default
        
        # Copy only production dependencies (already installed in preBuild)
        - cp -R node_modules .amplify-hosting/compute/default/
        
        # Copy only necessary files
        - cp -R public .amplify-hosting/compute/default/  # Static assets
        - cp .env .amplify-hosting/compute/default/
        
        # Remove development-only dependencies and files
        - find .amplify-hosting -type d -name 'test' -o -name 'tests' -o -name '__tests__' | xargs rm -rf
        - find .amplify-hosting -type f \( -name '*.map' -o -name '*.ts' -o -name '*.tsx' -o -name '*.test.*' -o -name '*.spec.*' \) -delete
        - find .amplify-hosting -type f \( -name '*.md' -o -name '*.markdown' -o -name 'LICENSE*' -o -name 'CHANGELOG*' -o -name 'README*' \) -delete
        - rm -rf .amplify-hosting/**/node_modules/{.bin,.cache,typescript,@types}
        
        # Remove any remaining source maps and development files
        - find .amplify-hosting -type f -name '*.map' -delete
        - find .amplify-hosting -type d -empty -delete
        
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
    discard-paths: no
    
  cache:
    paths:
      - '.pnpm-store/**/*'
      - 'node_modules/.pnpm/**/*'
      - 'node_modules/.cache/**/*'
  customRules:
    - source: '/'
      target: '/index.html'
      status: 200
    - source: '/<*>/'
      target: '/<*>/index.html'
      status: 200
    - source: '/<*>'
      target: '/<*>/index.html'
      status: 200
    - source: '/blog/<slug>'
      target: '/blog/<slug>/index.html'
      status: 200
    - source: '/blog/<slug>/'
      target: '/blog/<slug>/index.html'
      status: 200
    - source: '/changelog/<slug>'
      target: '/changelog/<slug>/index.html'
      status: 200
    - source: '/changelog/<slug>/'
      target: '/changelog/<slug>/index.html'
      status: 200
    - source: '/docs/<...slug>'
      target: '/docs/<...slug>/index.html'
      status: 200
    - source: '/docs/<...slug>/'
      target: '/docs/<...slug>/index.html'
      status: 200
    - source: '/authors/<author>'
      target: '/authors/<author>/index.html'
      status: 200
    - source: '/authors/<author>/'
      target: '/authors/<author>/index.html'
      status: 200
    - source: '/tags/<tag>'
      target: '/tags/<tag>/index.html'
      status: 200
    - source: '/tags/<tag>/'
      target: '/tags/<tag>/index.html'
      status: 200
    - source: '/categories/<category>'
      target: '/categories/<category>/index.html'
      status: 200
    - source: '/categories/<category>/'
      target: '/categories/<category>/index.html'
      status: 200