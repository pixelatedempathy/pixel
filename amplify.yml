version: 1
frontend:
  environment:
    _CUSTOM_IMAGE: amplify:al2023
    NODE_OPTIONS: --max-old-space-size=12288
  phases:
    preBuild:
      commands:
        - npm i -g pnpm
        - pnpm config set store-dir .pnpm-store
        - pnpm config set node-mirror https://nodejs.org/download/release/
        - pnpm i --frozen-lockfile --prefer-offline
    build:
      commands:
        - env >> .env
        - NODE_OPTIONS=--max-old-space-size=12288 pnpm run build --no-cache
        - cp -r .pnpm-store ./.amplify-hosting/compute/default
        - cp -r node_modules ./.amplify-hosting/compute/default
        - cp .env ./.amplify-hosting/compute/default/.env
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - .pnpm-store/**/*
      - node_modules/**/*
  customRules:
    - source: '/'
      target: '/index.html'
      status: 200
    - source: '/<*>/'
      target: '/<*>/index.html'
      status: 200
    - source: '/<*>'
      target: '/<*>/index.html'
      status: 200
    - source: '/blog/<slug>'
      target: '/blog/<slug>/index.html'
      status: 200
    - source: '/blog/<slug>/'
      target: '/blog/<slug>/index.html'
      status: 200
    - source: '/changelog/<slug>'
      target: '/changelog/<slug>/index.html'
      status: 200
    - source: '/changelog/<slug>/'
      target: '/changelog/<slug>/index.html'
      status: 200
    - source: '/docs/<...slug>'
      target: '/docs/<...slug>/index.html'
      status: 200
    - source: '/docs/<...slug>/'
      target: '/docs/<...slug>/index.html'
      status: 200
    - source: '/authors/<author>'
      target: '/authors/<author>/index.html'
      status: 200
    - source: '/authors/<author>/'
      target: '/authors/<author>/index.html'
      status: 200
    - source: '/tags/<tag>'
      target: '/tags/<tag>/index.html'
      status: 200
    - source: '/tags/<tag>/'
      target: '/tags/<tag>/index.html'
      status: 200
    - source: '/categories/<category>'
      target: '/categories/<category>/index.html'
      status: 200
    - source: '/categories/<category>/'
      target: '/categories/<category>/index.html'
      status: 200