version: 1
frontend:
  environment:
    _CUSTOM_IMAGE: 'amplify:al2023'
    NODE_OPTIONS: '--max-old-space-size=12288'

  phases:
    install:
      commands:
        - echo Installing nvm...
        - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.35.3/install.sh | bash
        - export NVM_DIR="$HOME/.nvm"
        - '[ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"'
        - '[ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"'

    preBuild:
      commands:
        - '. "$NVM_DIR/nvm.sh" && nvm install v22.16.0 && echo "node installed by arun"'
        - nvm use v22.16.0
        - npm i npm@latest -g
        - npm install -g pnpm
        - export SHELL=bash
        - pnpm setup
        - 'export PNPM_HOME="/root/.local/share/pnpm"'
        - 'export PATH="$PNPM_HOME:$PATH"'
        - 'export NODE_OPTIONS=--max-old-space-size=12288'
        - pnpm config set store-dir .pnpm-store
        - pnpm config set auto-install-peers true
        - pnpm config set strict-peer-dependencies false
        - pnpm config set dangerouslyallowallbuilds true
        - pnpm install --no-frozen-lockfile
        - pnpm rebuild
        - 'find node_modules -type d \( -name "test" -o -name "tests" -o -name "__tests__" -o -name "examples" \) -exec rm -rf {} + || true'
        - 'find node_modules -type f -name "*.d.ts" ! -path "*/@types/*" -delete || true'

    build:
      commands:
        - 'echo "NODE_ENV=production" > .env'
        - 'echo "CDN_BASE_URL=${CDN_BASE_URL:-/}" >> .env'
        - pnpm run build
        - 'if [ -n "$CDN_BUCKET_NAME" ]; then node scripts/upload-to-cdn.js || echo "CDN upload failed, continuing..."; fi'
        - 'mkdir -p .amplify-hosting/compute/default'
        - 'cp -r dist/* .amplify-hosting/compute/default/ || true'
        - 'cp .env .amplify-hosting/compute/default/.env || true'
        - 'mkdir -p .amplify-hosting/static'
        - 'cp -r dist/client/* .amplify-hosting/static/ || true'
        - ls -la .amplify-hosting/
        - 'echo "Static assets:"'
        - 'ls -la .amplify-hosting/static/ | head -10'
        - 'echo "Compute functions:"'
        - 'ls -la .amplify-hosting/compute/ | head -10'
        - 'find .amplify-hosting -type f \( -name "*.map" -o -name "*.ts" -o -name "*.tsx" -o -name "*.test.*" -o -name "*.spec.*" \) -delete || true'
        - 'find .amplify-hosting -type d -empty -delete || true'
        - du -sh .amplify-hosting/

  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'

  cache:
    paths: []
  customRules:
    - source: '/'
      target: '/index.html'
      status: 200
    - source: '/<*>/'
      target: '/<*>/index.html'
      status: 200
    - source: '/<*>'
      target: '/<*>/index.html'
      status: 200
    - source: '/blog/<slug>'
      target: '/blog/<slug>/index.html'
      status: 200
    - source: '/blog/<slug>/'
      target: '/blog/<slug>/index.html'
      status: 200
    - source: '/changelog/<slug>'
      target: '/changelog/<slug>/index.html'
      status: 200
    - source: '/changelog/<slug>/'
      target: '/changelog/<slug>/index.html'
      status: 200
    - source: '/docs/<...slug>'
      target: '/docs/<...slug>/index.html'
      status: 200
    - source: '/docs/<...slug>/'
      target: '/docs/<...slug>/index.html'
      status: 200
    - source: '/authors/<author>'
      target: '/authors/<author>/index.html'
      status: 200
    - source: '/authors/<author>/'
      target: '/authors/<author>/index.html'
      status: 200
    - source: '/tags/<tag>'
      target: '/tags/<tag>/index.html'
      status: 200
    - source: '/tags/<tag>/'
      target: '/tags/<tag>/index.html'
      status: 200
    - source: '/categories/<category>'
      target: '/categories/<category>/index.html'
      status: 200
    - source: '/categories/<category>/'
      target: '/categories/<category>/index.html'
      status: 200
