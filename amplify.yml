version: 1
frontend:
  environment:
    _CUSTOM_IMAGE: amplify:al2023
    NODE_OPTIONS: --max-old-space-size=12288
  phases:
    preBuild:
      commands:
        # Install pnpm and configure
        - npm i -g pnpm
        - pnpm config set store-dir .pnpm-store
        - pnpm config set node-mirror https://nodejs.org/download/release/
        - pnpm config set prefer-offline true
        - pnpm config set frozen-lockfile true
        - pnpm config set shamefully-hoist true
        
        # Install only production dependencies first (smaller memory footprint)
        - pnpm install --prod --frozen-lockfile --prefer-offline --shamefully-hoist
        
        # Then install dev dependencies
        - pnpm install --frozen-lockfile --prefer-offline --shamefully-hoist --ignore-scripts
        
    build:
      commands:
        # Set environment variables
        - env >> .env
        
        # Build with increased memory
        - NODE_OPTIONS="--max-old-space-size=12288" pnpm run build
        
        # Create output directory structure
        - mkdir -p .amplify-hosting/compute/default
        
        # Copy only production node_modules (exclude devDependencies)
        - pnpm prune --prod
        - cp -r node_modules ./.amplify-hosting/compute/default/
        
        # Copy build output
        - cp -r public ./.amplify-hosting/compute/default/  # Static assets
        - cp -r .env ./.amplify-hosting/compute/default/
        
        # Clean up unnecessary files
        - find ./.amplify-hosting -name "*.map" -delete
        - find ./.amplify-hosting -name "*.ts" -delete
        - find ./.amplify-hosting -name "*.tsx" -delete
        - find ./.amplify-hosting -name "*.test.*" -delete
        - find ./.amplify-hosting -name "*.spec.*" -delete
        - rm -rf ./.amplify-hosting/**/node_modules/.cache
        - rm -rf ./.amplify-hosting/**/node_modules/typescript
        - rm -rf ./.amplify-hosting/**/node_modules/@types
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - .pnpm-store/**/*
      - node_modules/**/*
  customRules:
    - source: '/'
      target: '/index.html'
      status: 200
    - source: '/<*>/'
      target: '/<*>/index.html'
      status: 200
    - source: '/<*>'
      target: '/<*>/index.html'
      status: 200
    - source: '/blog/<slug>'
      target: '/blog/<slug>/index.html'
      status: 200
    - source: '/blog/<slug>/'
      target: '/blog/<slug>/index.html'
      status: 200
    - source: '/changelog/<slug>'
      target: '/changelog/<slug>/index.html'
      status: 200
    - source: '/changelog/<slug>/'
      target: '/changelog/<slug>/index.html'
      status: 200
    - source: '/docs/<...slug>'
      target: '/docs/<...slug>/index.html'
      status: 200
    - source: '/docs/<...slug>/'
      target: '/docs/<...slug>/index.html'
      status: 200
    - source: '/authors/<author>'
      target: '/authors/<author>/index.html'
      status: 200
    - source: '/authors/<author>/'
      target: '/authors/<author>/index.html'
      status: 200
    - source: '/tags/<tag>'
      target: '/tags/<tag>/index.html'
      status: 200
    - source: '/tags/<tag>/'
      target: '/tags/<tag>/index.html'
      status: 200
    - source: '/categories/<category>'
      target: '/categories/<category>/index.html'
      status: 200
    - source: '/categories/<category>/'
      target: '/categories/<category>/index.html'
      status: 200